<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Polybond Coating</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  background:#ffffff;
  color:#3b3b3b;
  overflow:hidden;
}

.hero{
  width:100%;
  height:100vh;
  display:grid;
  grid-template-columns:1fr 1fr;
}

.hero-left{
  padding:80px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  background:#ffffff;
}

.hero-tag{
  font-size:12px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:#7b7b7b;
  margin-bottom:24px;
}

.hero-title{
  font-size:72px;
  line-height:0.95;
  font-weight:600;
  letter-spacing:-3px;
  margin-bottom:24px;
}

.hero-sub{
  max-width:500px;
  font-size:16px;
  line-height:1.8;
  color:#6b6b6b;
  margin-bottom:40px;
}

.hero-btn{
  width:max-content;
  padding:16px 28px;
  border:none;
  background:#3b3b3b;
  color:white;
  cursor:pointer;
  font-size:14px;
  letter-spacing:1px;
  transition:0.3s;
}

.hero-btn:hover{
  background:#000;
}

.hero-right{
  background:#f5f5f5;
  padding:20px;
  overflow:hidden;
}

.mosaic{
  width:100%;
  height:100%;
  display:grid;
  grid-template-columns:repeat(6,1fr);
  grid-auto-rows:1fr;
  gap:10px;
}

.swatch{
  border-radius:8px;
  cursor:pointer;
  transition:0.35s ease;
  position:relative;
  overflow:hidden;
}

.swatch:hover{
  transform:scale(1.04);
}

.swatch::after{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(
    135deg,
    rgba(255,255,255,0.18),
    rgba(255,255,255,0)
  );
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.45);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:0.3s;
}

.modal.active{
  opacity:1;
  pointer-events:auto;
}

.modal-content{
  width:420px;
  background:white;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,0.2);
}

.modal-swatch{
  height:240px;
}

.modal-info{
  padding:32px;
}

.modal-code{
  font-size:13px;
  letter-spacing:2px;
  color:#888;
  margin-bottom:10px;
}

.modal-name{
  font-size:34px;
  font-weight:600;
  margin-bottom:12px;
}

.modal-finish{
  font-size:15px;
  color:#666;
  margin-bottom:28px;
}

.modal-btn{
  width:100%;
  padding:16px;
  border:none;
  background:#3b3b3b;
  color:white;
  font-size:14px;
  cursor:pointer;
  transition:0.3s;
}

.modal-btn:hover{
  background:#000;
}

.close{
  position:absolute;
  top:20px;
  right:24px;
  font-size:28px;
  cursor:pointer;
  color:white;
}

@media(max-width:900px){

  .hero{
    grid-template-columns:1fr;
  }

  .hero-left{
    padding:48px 32px;
  }

  .hero-title{
    font-size:48px;
  }

  .hero-right{
    height:50vh;
  }

  .mosaic{
    grid-template-columns:repeat(4,1fr);
  }

}

</style>
</head>

<body>

<section class="hero">

  <div class="hero-left">

    <div class="hero-tag">
      Architectural Powder Coatings
    </div>

    <h1 class="hero-title">
      Colour.<br>
      Material.<br>
      Finish.
    </h1>

    <p class="hero-sub">
      Explore Polybond powder coating shades through an interactive material library designed for architects, fabricators and facade consultants.
    </p>

    <button class="hero-btn">
      Browse Shade Library
    </button>

  </div>

  <div class="hero-right">
    <div class="mosaic" id="mosaic"></div>
  </div>

</section>

<div class="modal" id="modal">

  <div class="close" onclick="closeModal()">
    ×
  </div>

  <div class="modal-content">

    <div class="modal-swatch" id="modalSwatch"></div>

    <div class="modal-info">

      <div class="modal-code" id="modalCode"></div>

      <div class="modal-name" id="modalName"></div>

      <div class="modal-finish" id="modalFinish"></div>

      <button class="modal-btn">
        Request Sample
      </button>

    </div>

  </div>

</div>

<script src="pp_colours.js"></script>
<script src="ep_colours.js"></script>
<script>

const colours = [...ppColours, ...epColours];

const mosaic = document.getElementById('mosaic');

colours.forEach((colour,index) => {

  const swatch = document.createElement('div');

  swatch.classList.add('swatch');

  swatch.style.backgroundColor = colour.hex || colour.color || '#cccccc';

  if(index % 7 === 0){
    swatch.style.gridRow = "span 2";
  }

  swatch.onclick = () => openModal(colour);

  mosaic.appendChild(swatch);

});

function openModal(colour){

  document.getElementById('modal').classList.add('active');

  document.getElementById('modalSwatch').style.background =
    colour.hex || colour.color || '#cccccc';

  document.getElementById('modalCode').innerText =
    colour.code || 'POLYBOND';

  document.getElementById('modalName').innerText =
    colour.name || 'Shade';

  document.getElementById('modalFinish').innerText =
    colour.finish || 'Architectural Powder Coating';

}

function closeModal(){

  document.getElementById('modal').classList.remove('active');

}

document.getElementById('modal').addEventListener('click', function(e){

  if(e.target.id === 'modal'){
    closeModal();
  }

});

</script>

</body>
</html>
